# =========================================================
#  LocatorBarCompass
#  Требует Paper 1.21.6+  (используется Attribute.WAYPOINT_RECEIVE_RANGE)
#
#  ВАЖНО: сам HUD-элемент Locator Bar в принципе включается
#  геймрулом ванильного Minecraft:
#      /gamerule locatorBar true
#  Он должен быть true, иначе бар не появится вообще ни у кого,
#  независимо от настроек этого плагина.
# =========================================================

# Главный переключатель. Если false - плагин ничего не трогает,
# Locator Bar работает 100% по-ванильному (как задаёт геймрул) у всех игроков.
enabled: true

# Считать ли предметом-компасом также recovery compass.
# Список материалов, любой из которых в руке/оффхенде "включает" бар игроку.
compass-materials:
  - COMPASS
  - RECOVERY_COMPASS

# Проверять ли оффхенд (не только основную руку).
check-offhand: true

# Как часто (в тиках) плагин на всякий случай перепроверяет руки всех игроков,
# помимо мгновенной проверки по событиям смены предмета/оффхенда.
# 20 тиков = 1 секунда.
check-interval: 10

# Радиус waypoint_receive_range, который выставляется игроку,
# когда бар должен работать (компас в руке, или есть permission locatorbar.bypass,
# или фича выключена в конфиге). 60000000 - ванильное значение по умолчанию (практически безлимит).
full-receive-range: 60000000.0

# Радиус, который выставляется игроку, когда бар должен быть скрыт
# (нет компаса в руке/оффхенде и нет permission locatorbar.bypass).
disabled-receive-range: 0.0

# Радиус waypoint_transmit_range ("транслирую себя другим").
# Выставляется ВСЕМ игрокам всегда максимальным и НЕ зависит от компаса,
# чтобы игрок без компаса сам оставался виден на бару у тех, кто компас держит
# (компас влияет только на то, видит ли игрок ДРУГИХ, а не на то, видят ли ЕГО).
full-transmit-range: 60000000.0
